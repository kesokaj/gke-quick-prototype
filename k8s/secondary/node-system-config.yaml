# Node system configuration for secondary pool
# Applied via: gcloud container node-pools create --system-config-from-file
#
# Ref: https://cloud.google.com/kubernetes-engine/docs/how-to/node-system-config
kubeletConfig:
  allowedUnsafeSysctls:
    - "net.*"
linuxConfig:
  sysctl:
    # IPv6 — GCP blocks IPv6 netlink ops from certain shims,
    net.ipv6.conf.all.disable_ipv6: "1"
    net.ipv6.conf.default.disable_ipv6: "1"

    # Socket / Listener Backlog
    net.core.somaxconn: "32768"
    net.core.netdev_max_backlog: "16384"

    # Socket Buffer Sizes
    net.core.rmem_max: "16777216"
    net.core.rmem_default: "262144"
    net.core.wmem_max: "16777216"
    net.core.wmem_default: "262144"
    net.ipv4.tcp_rmem: "4096 131072 16777216"
    net.ipv4.tcp_wmem: "4096 131072 16777216"

    # Connection Reuse / TIME_WAIT
    net.ipv4.tcp_tw_reuse: "1"
    net.ipv4.tcp_max_tw_buckets: "262144"
    net.ipv4.tcp_max_orphans: "65536"

    # Conntrack (netfilter)
    net.netfilter.nf_conntrack_max: "1048576"
    net.netfilter.nf_conntrack_buckets: "262144"
    net.netfilter.nf_conntrack_tcp_timeout_established: "86400"
    net.netfilter.nf_conntrack_tcp_timeout_close_wait: "60"
    net.netfilter.nf_conntrack_tcp_timeout_time_wait: "30"
    net.netfilter.nf_conntrack_acct: "1"

    # File Descriptors
    fs.file-max: "2097152"
    fs.inotify.max_user_instances: "8192"
    fs.inotify.max_user_watches: "524288"
