---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-controller
  namespace: sandbox-control
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-controller
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, delete, patch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  - apiGroups: [""]
    resources: [events]
    verbs: [list]
  - apiGroups: [""]
    resources: [services, endpoints]
    verbs: [get, list, create, delete]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, patch]
  - apiGroups: [metrics.k8s.io]
    resources: [pods]
    verbs: [list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-controller
subjects:
  - kind: ServiceAccount
    name: sandbox-controller
    namespace: sandbox-control
roleRef:
  kind: ClusterRole
  name: sandbox-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-controller
  namespace: sandbox-control
  labels:
    app: sandbox-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-controller
  template:
    metadata:
      labels:
        app: sandbox-controller
    spec:
      serviceAccountName: sandbox-controller
      containers:
        - name: controller
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: TARGET_NAMESPACE
              value: sandbox
            - name: DEPLOYMENT_NAME
              value: sandbox-pool
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-controller
  namespace: sandbox-control
spec:
  selector:
    app: sandbox-controller
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: LoadBalancer
