# Sandbox Network Isolation
# Egress: public internet only (RFC1918/loopback/CGNAT blocked, GCE metadata allowed).
# Ingress: sandbox-control namespace on port 3004 only.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-isolation
  namespace: sandbox
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Rule 1: Allow GCE metadata server (Workload Identity token fetch)
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - port: 80
          protocol: TCP
    # Rule 2: Allow public internet (everything except internal ranges)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918 (nodes, pods, services)
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 127.0.0.0/8      # Loopback
              - 169.254.0.0/16   # Link-local (metadata server allowed above)
              - 100.64.0.0/10    # CGNAT / GKE alias ranges
        - ipBlock:
            cidr: ::/0
            except:
              - fc00::/7         # Unique local (RFC4193)
              - ::1/128          # Loopback
              - fe80::/10        # Link-local
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sandbox-control
      ports:
        - port: 3004
          protocol: TCP

