# Conntrack Reporter — pushes netd metrics to Cloud Monitoring
# via prometheus-to-sd. Runs on all nodes (hostNetwork: true, port 10231).
# Uses Workload Identity via conntrack-reporter KSA.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: conntrack-reporter
  namespace: gmp-public
  annotations:
    iam.gke.io/gcp-service-account: gke-default@PROJECT_ID.iam.gserviceaccount.com

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: conntrack-reporter
  namespace: gmp-public
spec:
  selector:
    matchLabels:
      k8s-app: conntrack-reporter
  template:
    metadata:
      labels:
        k8s-app: conntrack-reporter
    spec:
      serviceAccountName: conntrack-reporter
      containers:
        - name: prometheus-to-sd
          image: gcr.io/google-containers/prometheus-to-sd:v0.9.2
          imagePullPolicy: IfNotPresent
          command:
            - /monitor
            - --source=node:http://localhost:10231?whitelisted=conntrack_entries,conntrack_error_count,num_inuse_sockets,num_tw_sockets,socket_memory
            - --stackdriver-prefix=custom.googleapis.com/gke
            - --api-override=https://monitoring.googleapis.com
            - --export-interval=120s
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      dnsPolicy: ClusterFirst
      hostNetwork: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 0
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists
        - key: components.gke.io/gke-managed-components
          operator: Exists
