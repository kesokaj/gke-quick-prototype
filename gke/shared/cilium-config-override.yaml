# ═══════════════════════════════════════════════════════════════════════════════
# Cilium Emergency Override — Production Config
# ═══════════════════════════════════════════════════════════════════════════════
#
# Applied as: cilium-config-emergency-override ConfigMap (kube-system)
# Method:     kubectl patch with field-manager (see cluster.sh apply_shared)
#
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-config-emergency-override
  namespace: kube-system
data:
  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  OBSERVABILITY                                                          │
  # └──────────────────────────────────────────────────────────────────────────┘

  # Monitor aggregation controls the granularity of BPF tracing events.
  # "maximum" with 60s interval is the most impactful tuning to reduce
  # cilium-agent CPU when processing high traffic volumes.
  #
  # Default: medium (5s interval)
  monitor-aggregation: "maximum"
  monitor-aggregation-interval: "60s"

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  API SERVER LOAD                                                        │
  # └──────────────────────────────────────────────────────────────────────────┘

  # K8s client QPS and burst control the agent's request rate to the API server.
  # 5× upstream default. GKE API server self-protects with 429s via APF.
  #
  # Default: k8s-client-qps=10, k8s-client-burst=20
  k8s-client-qps: "50"
  k8s-client-burst: "100"

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  AGENT ENDPOINT RATE LIMITS (Static)                                    │
  # └──────────────────────────────────────────────────────────────────────────┘

  # Static rate limits for endpoint create/delete operations.
  # 100/s with burst 300, 16 parallel requests, auto-adjust disabled.
  #
  # Default: rate-limit:0.5/s, burst:4, parallel:4, auto-adjust:true
  api-rate-limit: '{"endpoint-create": "rate-limit:100/s,rate-burst:300,parallel-requests:16,max-wait-duration:60s,auto-adjust:false", "endpoint-delete": "rate-limit:100/s,rate-burst:300,parallel-requests:16,max-wait-duration:60s,auto-adjust:false"}'

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  eBPF MAP CAPACITY                                                      │
  # └──────────────────────────────────────────────────────────────────────────┘

  # Dynamic size ratio: percentage of system memory allocated to eBPF maps.
  # Doubled from 0.25% → 0.5% to prevent map-resize stalls during surges.
  #
  # Default: 0.0025 (0.25% of system memory)
  bpf-map-dynamic-size-ratio: "0.005"
