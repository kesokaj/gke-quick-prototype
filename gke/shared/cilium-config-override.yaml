# Cilium Emergency Override — DPv2 Scale-Optimized Tuning
#
# Applied as cilium-config-emergency-override ConfigMap (kube-system).
# See cluster.sh apply_shared for the patching method.

apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-config-emergency-override
  namespace: kube-system
data:
  # Monitor aggregation: "maximum" + 60s reduces cilium-agent CPU under high traffic.
  monitor-aggregation: "maximum"
  monitor-aggregation-interval: "60s"

  # K8s client QPS/burst: 5× upstream default. API server self-protects via APF.
  k8s-client-qps: "50"
  k8s-client-burst: "100"

  # Endpoint rate limits: 100/s burst 300, 16 parallel, auto-adjust disabled.
  api-rate-limit: '{"endpoint-create": "rate-limit:100/s,rate-burst:300,parallel-requests:16,max-wait-duration:60s,auto-adjust:false", "endpoint-delete": "rate-limit:100/s,rate-burst:300,parallel-requests:16,max-wait-duration:60s,auto-adjust:false"}'

  # eBPF map size: doubled from 0.25% → 0.5% of system memory to prevent map-resize stalls.
  bpf-map-dynamic-size-ratio: "0.005"
