# gVisor Metrics Reporter — pushes runsc-metric-server data to Cloud Monitoring
# via prometheus-to-sd. Runs on gVisor nodes only (hostNetwork: true, port 9115).

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gvisor-metrics-reporter
  namespace: gmp-public
spec:
  selector:
    matchLabels:
      k8s-app: gvisor-metrics-reporter
  template:
    metadata:
      labels:
        k8s-app: gvisor-metrics-reporter
    spec:
      serviceAccountName: conntrack-reporter
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      containers:
        - name: prometheus-to-sd
          image: gcr.io/google-containers/prometheus-to-sd:v0.9.2
          imagePullPolicy: IfNotPresent
          command:
            - /monitor
            - --source=node:http://localhost:9115?whitelisted=meta_sandbox_running,fs_opens,fs_reads,netstack_tcp_current_established,netstack_nic_rx_bytes,netstack_nic_tx_bytes,netstack_dropped_packets,netstack_ip_packets_received,netstack_ip_packets_sent
            - --stackdriver-prefix=custom.googleapis.com/gke
            - --api-override=https://monitoring.googleapis.com
            - --export-interval=120s
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      dnsPolicy: ClusterFirst
      hostNetwork: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 0
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists
        - key: components.gke.io/gke-managed-components
          operator: Exists
