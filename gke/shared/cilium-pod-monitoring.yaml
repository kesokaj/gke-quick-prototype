apiVersion: monitoring.googleapis.com/v1
kind: ClusterPodMonitoring
metadata:
  name: cilium-agent
spec:
  selector:
    matchLabels:
      k8s-app: cilium
  endpoints:
    - port: 9990
      interval: 10s
      path: /metrics
  targetLabels:
    metadata:
      - pod
      - node
      - container
